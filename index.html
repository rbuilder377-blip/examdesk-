<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExamDesk — Online Examination Platform</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg2:#1a1d2e;--bg3:#242740;
  --surface:#1e2235;--surface2:#252a3d;
  --border:#2e3350;--border2:#3a4060;
  --text:#e8eaf6;--text2:#9499c0;--text3:#5a6080;
  --blue:#378ADD;--blue-dark:#185FA5;
  --green:#639922;--green-dark:#3B6D11;
  --red:#E24B4A;--red-dark:#A32D2D;
  --amber:#BA7517;
  --radius:8px;--radius-lg:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}
input,textarea,select{font-family:inherit;font-size:14px;padding:9px 13px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface2);color:var(--text);width:100%;transition:border-color .15s,box-shadow .15s;outline:none}
input:focus,textarea:focus,select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(55,138,221,.18)}
input::placeholder,textarea::placeholder{color:var(--text3)}
select option{background:var(--surface2)}
.btn{font-family:inherit;font-size:14px;font-weight:500;padding:9px 18px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface2);color:var(--text);cursor:pointer;transition:background .15s,transform .1s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn:hover{background:var(--bg3)}.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-primary{background:var(--blue-dark);color:#fff;border-color:var(--blue-dark)}
.btn-primary:hover{background:#0C447C}
.btn-danger{background:var(--red-dark);color:#fff;border-color:var(--red-dark)}
.btn-danger:hover{background:#791F1F}
.btn-success{background:var(--green-dark);color:#fff;border-color:var(--green-dark)}
.btn-sm{padding:6px 13px;font-size:13px}
.hidden{display:none!important}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem}
.badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;display:inline-flex;align-items:center;gap:4px;letter-spacing:.3px}
.badge-blue{background:rgba(55,138,221,.15);color:#7ab5ef}
.badge-green{background:rgba(99,153,34,.15);color:#8fcc40}
.badge-amber{background:rgba(186,117,23,.15);color:#e8a63a}
.badge-red{background:rgba(226,75,74,.15);color:#f07170}
.badge-gray{background:rgba(255,255,255,.07);color:var(--text2)}
.page{padding:2rem 1.5rem;max-width:900px;margin:0 auto;width:100%}
.flex{display:flex}.gap-8{gap:8px}.gap-12{gap:12px}.gap-16{gap:16px}
.flex-col{flex-direction:column}.align-center{align-items:center}
.justify-between{justify-content:space-between}.justify-end{justify-content:flex-end}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.mt-4{margin-top:4px}.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}.mt-24{margin-top:24px}
.mb-4{margin-bottom:4px}.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}.mb-24{margin-bottom:24px}
.label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.text-sm{font-size:13px;color:var(--text2)}.text-xs{font-size:12px;color:var(--text3)}
.text-error{font-size:13px;color:#f07170;line-height:1.5}
.text-success{font-size:13px;color:#8fcc40;line-height:1.5}
.divider{border:none;border-top:1px solid var(--border);margin:1rem 0}
.nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:100}
.nav-brand{font-size:17px;font-weight:700;display:flex;align-items:center;gap:10px;color:var(--text)}
.brand-icon{width:34px;height:34px;background:var(--blue-dark);border-radius:var(--radius);display:flex;align-items:center;justify-content:center}
.brand-icon i{font-size:18px;color:#fff}
.nav-right{display:flex;align-items:center;gap:12px}
.stat-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;text-align:center}
.stat-num{font-size:28px;font-weight:700;color:var(--text)}.stat-label{font-size:13px;color:var(--text2);margin-top:3px}
.exam-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:12px;transition:border-color .15s}
.exam-card:hover{border-color:var(--border2)}
.question-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:14px}
.q-num{font-size:12px;font-weight:600;color:var(--blue);margin-bottom:6px;display:flex;align-items:center;gap:8px}
.q-text{font-size:16px;font-weight:500;color:var(--text);margin-bottom:14px;line-height:1.5}
.option-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;cursor:pointer;transition:background .1s,border-color .1s;font-size:14px;color:var(--text)}
.option-row:hover{background:var(--surface2);border-color:var(--border2)}
.option-row.selected{border-color:var(--blue);background:rgba(55,138,221,.1)}
.option-row.correct{border-color:#639922;background:rgba(99,153,34,.12);color:#8fcc40}
.option-row.wrong{border-color:var(--red-dark);background:rgba(163,45,45,.12);color:#f07170}
.tab-bar{display:flex;gap:4px;background:var(--surface2);padding:4px;border-radius:var(--radius-lg);margin-bottom:1.75rem;border:1px solid var(--border)}
.tab{flex:1;padding:8px 12px;font-size:13px;font-weight:500;border:none;border-radius:var(--radius);background:transparent;color:var(--text2);cursor:pointer;transition:background .15s,color .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.tab.active{background:var(--bg3);color:var(--text);border:1px solid var(--border2)}
.tab:hover:not(.active){background:rgba(255,255,255,.05)}
.progress-bar{height:5px;background:var(--surface2);border-radius:3px;margin-top:8px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;background:var(--blue);transition:width .4s}
.submission-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.results-table{width:100%;border-collapse:collapse;font-size:13px}
.results-table th{text-align:left;padding:10px 14px;color:var(--text2);font-weight:600;border-bottom:1px solid var(--border);font-size:12px;text-transform:uppercase;letter-spacing:.4px}
.results-table td{padding:10px 14px;border-bottom:1px solid var(--border);color:var(--text)}
.results-table tr:last-child td{border-bottom:none}
.results-table tr:hover td{background:var(--surface2)}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.65);display:flex;align-items:flex-start;justify-content:center;padding:60px 1rem 2rem;z-index:200;backdrop-filter:blur(2px)}
.modal{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border2);padding:1.5rem;width:100%;max-width:580px;max-height:85vh;overflow-y:auto}
.score-circle{width:110px;height:110px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column;margin:0 auto 1.25rem;border:3px solid}
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;background:var(--bg)}
.auth-box{width:100%;max-width:420px}
.auth-logo{text-align:center;margin-bottom:2rem}
.logo-icon{width:60px;height:60px;background:var(--blue-dark);border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.logo-icon i{font-size:30px;color:#fff}
.timer-display{font-size:15px;font-weight:700;color:var(--blue);font-variant-numeric:tabular-nums;letter-spacing:1px}
.timer-display.warn{color:#e8a63a}.timer-display.danger{color:#f07170}
.empty-state{text-align:center;padding:3rem 1rem;color:var(--text2)}
.empty-state i{font-size:40px;color:var(--text3);margin-bottom:12px;display:block}
.spinner{width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;color:var(--text2)}
.loading-screen .spinner{width:36px;height:36px;border-width:3px}
.info-box{background:rgba(55,138,221,.08);border:1px solid rgba(55,138,221,.25);border-radius:var(--radius);padding:10px 14px;font-size:13px;color:#7ab5ef;line-height:1.5}
@media(max-width:600px){
  .grid-2{grid-template-columns:1fr}.grid-3{grid-template-columns:1fr 1fr}
  .exam-card{flex-direction:column;align-items:flex-start}
  .page{padding:1.25rem 1rem}.nav{padding:0 1rem}
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="screen-loading" class="loading-screen">
  <div class="spinner"></div>
  <span>Loading ExamDesk...</span>
</div>

<!-- AUTH -->
<div id="screen-auth" class="hidden">
  <div class="auth-wrap">
    <div class="auth-box">
      <div class="auth-logo">
        <div class="logo-icon"><i class="ti ti-school"></i></div>
        <h1 style="font-size:24px;font-weight:700;letter-spacing:-.5px">ExamDesk</h1>
        <p style="color:var(--text2);margin-top:6px;font-size:14px">Online examination platform</p>
      </div>
      <div class="card">
        <div class="tab-bar" id="auth-tabs">
          <button class="tab active" onclick="switchAuthTab('login')"><i class="ti ti-login"></i> Sign in</button>
          <button class="tab" onclick="switchAuthTab('register')"><i class="ti ti-user-plus"></i> Create account</button>
        </div>

        <!-- LOGIN -->
        <div id="auth-login">
          <div class="mb-12"><div class="label">Email</div><input type="email" id="login-email" placeholder="your@email.com" onkeydown="if(event.key==='Enter')doLogin()"></div>
          <div class="mb-16"><div class="label">Password</div><input type="password" id="login-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
          <div id="login-error" class="text-error mb-12 hidden"></div>
          <button class="btn btn-primary" id="login-btn" style="width:100%;justify-content:center" onclick="doLogin()"><i class="ti ti-login"></i> Sign in</button>
        </div>

        <!-- REGISTER -->
        <div id="auth-register" class="hidden">
          <div class="mb-12"><div class="label">Full name</div><input type="text" id="reg-name" placeholder="Your full name"></div>
          <div class="mb-12"><div class="label">Email</div><input type="email" id="reg-email" placeholder="your@email.com"></div>
          <div class="mb-12"><div class="label">Password</div><input type="password" id="reg-pass" placeholder="Min 6 characters"></div>
          <div class="mb-12">
            <div class="label">Account type</div>
            <select id="reg-role" onchange="toggleAdminCode()">
              <option value="student">Student</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <div id="admin-code-row" class="mb-16 hidden">
            <div class="label">Admin access code</div>
            <input type="password" id="reg-admin-code" placeholder="Enter the admin code">
          </div>
          <div id="reg-error" class="text-error mb-12 hidden"></div>
          <div id="reg-success" class="info-box mb-12 hidden"></div>
          <button class="btn btn-primary" id="reg-btn" style="width:100%;justify-content:center" onclick="doRegister()"><i class="ti ti-user-plus"></i> Create account</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ADMIN -->
<div id="screen-admin" class="hidden">
  <nav class="nav">
    <div class="nav-brand"><div class="brand-icon"><i class="ti ti-school"></i></div> ExamDesk <span class="badge badge-blue">Admin</span></div>
    <div class="nav-right">
      <span class="text-sm" id="admin-name-display"></span>
      <button class="btn btn-sm" onclick="doLogout()"><i class="ti ti-logout"></i> Sign out</button>
    </div>
  </nav>
  <div class="page">
    <div class="tab-bar" id="admin-main-tabs">
      <button class="tab active" onclick="adminTab('dashboard')"><i class="ti ti-layout-dashboard"></i> Dashboard</button>
      <button class="tab" onclick="adminTab('exams')"><i class="ti ti-file-text"></i> Exams</button>
      <button class="tab" onclick="adminTab('students')"><i class="ti ti-users"></i> Students</button>
      <button class="tab" onclick="adminTab('results')"><i class="ti ti-chart-bar"></i> Results</button>
    </div>
    <div id="admin-dashboard"></div>
    <div id="admin-exams" class="hidden"></div>
    <div id="admin-students" class="hidden"></div>
    <div id="admin-results" class="hidden"></div>
  </div>
</div>

<!-- STUDENT -->
<div id="screen-student" class="hidden">
  <nav class="nav">
    <div class="nav-brand"><div class="brand-icon"><i class="ti ti-school"></i></div> ExamDesk</div>
    <div class="nav-right">
      <span class="text-sm" id="student-name-display"></span>
      <button class="btn btn-sm" onclick="doLogout()"><i class="ti ti-logout"></i> Sign out</button>
    </div>
  </nav>
  <div class="page">
    <div class="tab-bar" id="student-tabs">
      <button class="tab active" onclick="studentTab('exams')"><i class="ti ti-file-text"></i> Available exams</button>
      <button class="tab" onclick="studentTab('myresults')"><i class="ti ti-trophy"></i> My results</button>
    </div>
    <div id="student-exams"></div>
    <div id="student-myresults" class="hidden"></div>
  </div>
</div>

<!-- TAKE EXAM -->
<div id="screen-take-exam" class="hidden">
  <nav class="nav">
    <div class="nav-brand"><div class="brand-icon"><i class="ti ti-school"></i></div> ExamDesk</div>
    <div class="nav-right">
      <span class="timer-display" id="exam-timer-display">60:00</span>
      <button class="btn btn-sm btn-danger" onclick="confirmSubmit()"><i class="ti ti-check"></i> Submit</button>
    </div>
  </nav>
  <div class="page">
    <div id="exam-header" class="mb-24"></div>
    <div class="mb-24">
      <div class="flex justify-between mb-8">
        <span class="text-xs" id="q-progress-text"></span>
        <span class="text-xs" id="q-answered-text"></span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="q-progress-fill" style="width:0%"></div></div>
    </div>
    <div id="exam-questions"></div>
    <div style="text-align:center;padding:2rem 0">
      <button class="btn btn-success" onclick="confirmSubmit()"><i class="ti ti-check"></i> Submit exam</button>
    </div>
  </div>
</div>

<!-- RESULT -->
<div id="screen-result" class="hidden">
  <nav class="nav">
    <div class="nav-brand"><div class="brand-icon"><i class="ti ti-school"></i></div> ExamDesk</div>
    <div class="nav-right"><button class="btn btn-sm" onclick="goBackToDashboard()"><i class="ti ti-arrow-left"></i> Back</button></div>
  </nav>
  <div class="page" style="max-width:700px"><div id="result-content"></div></div>
</div>

<!-- MODAL: CREATE/EDIT EXAM -->
<div id="modal-create-exam" class="hidden">
  <div class="modal-overlay" onclick="overlayClose(event,'modal-create-exam')">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="flex justify-between align-center mb-16">
        <h2 style="font-size:17px;font-weight:600" id="modal-exam-title-h">Create exam</h2>
        <button class="btn btn-sm" onclick="closeModal('modal-create-exam')"><i class="ti ti-x"></i></button>
      </div>
      <div class="mb-12"><div class="label">Exam title *</div><input type="text" id="exam-title-input" placeholder="e.g. Biology — Chapter 3"></div>
      <div class="mb-12"><div class="label">Description</div><input type="text" id="exam-desc-input" placeholder="Brief description for students"></div>
      <div class="grid-2 mb-12">
        <div><div class="label">Duration (minutes)</div><input type="number" id="exam-duration-input" value="60" min="5" max="300"></div>
        <div><div class="label">Pass mark (%)</div><input type="number" id="exam-pass-input" value="50" min="1" max="100"></div>
      </div>
      <div class="mb-16">
        <div class="label">Status</div>
        <select id="exam-status-input">
          <option value="draft">Draft — not visible to students</option>
          <option value="active">Active — students can take it</option>
        </select>
      </div>
      <div class="divider"></div>
      <div class="flex justify-between align-center mb-12">
        <div style="font-size:14px;font-weight:600">Questions <span class="badge badge-gray" id="q-count-badge">0</span></div>
        <div class="flex gap-8 align-center">
          <select id="add-q-type" style="width:auto;font-size:13px;padding:6px 10px">
            <option value="mcq">Multiple choice</option>
            <option value="truefalse">True / False</option>
            <option value="short">Short answer</option>
            <option value="essay">Essay</option>
          </select>
          <button class="btn btn-sm" onclick="addQuestion()"><i class="ti ti-plus"></i> Add</button>
        </div>
      </div>
      <div id="questions-editor"></div>
      <div id="modal-exam-error" class="text-error mb-12 hidden"></div>
      <div class="flex justify-end gap-8 mt-16">
        <button class="btn btn-sm" onclick="closeModal('modal-create-exam')">Cancel</button>
        <button class="btn btn-sm btn-primary" id="save-exam-btn" onclick="saveExam()"><i class="ti ti-device-floppy"></i> Save exam</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: VIEW SUBMISSION -->
<div id="modal-view-submission" class="hidden">
  <div class="modal-overlay" onclick="overlayClose(event,'modal-view-submission')">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="flex justify-between align-center mb-16">
        <h2 style="font-size:17px;font-weight:600">Submission review</h2>
        <button class="btn btn-sm" onclick="closeModal('modal-view-submission')"><i class="ti ti-x"></i></button>
      </div>
      <div id="submission-review-content"></div>
    </div>
  </div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────
const SUPABASE_URL = 'https://szqzdrcdsmilnzjatljd.supabase.co';
const SUPABASE_KEY = 'sb_publishable_RnvYMUWR_cKwZvfxaDyMAA_Pqx02sCz';
// Admin code is stored server-side and validated here only as a gate.
// Change this to any secret phrase you want.
const ADMIN_CODE = 'EXAM-ADMIN-2024';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

let session=null, profile=null, currentExam=null;
let examAnswers={}, timerInterval=null;
let editingExamId=null, draftQuestions=[];

const el  = id => document.getElementById(id);
const show = id => el(id).classList.remove('hidden');
const hide = id => el(id).classList.add('hidden');
const hideAll = (...ids) => ids.forEach(hide);
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2);
const qTypeLabel = t => ({mcq:'MCQ',truefalse:'True/False',short:'Short answer',essay:'Essay'}[t]||t);
function overlayClose(e,id){if(e.target===e.currentTarget)closeModal(id);}
function closeModal(id){hide(id);}

function setBtn(id, loading, label){
  const b=el(id); if(!b)return;
  b.disabled=loading;
  b.innerHTML=loading?'<span class="spinner"></span> Please wait...':label;
}

// ─── INIT ─────────────────────────────────────────────────
(async()=>{
  const{data:{session:s}}=await sb.auth.getSession();
  if(s){ session=s; await loadProfile(); }
  else { hide('screen-loading'); show('screen-auth'); }

  sb.auth.onAuthStateChange(async(_,s)=>{
    session=s;
    if(s){ await loadProfile(); }
    else{
      profile=null;
      hideAll('screen-admin','screen-student','screen-take-exam','screen-result');
      show('screen-auth');
    }
  });
})();

async function loadProfile(){
  const{data,error}=await sb.from('profiles').select('*').eq('id',session.user.id).single();
  hide('screen-loading');
  if(error || !data){
    // Profile may not exist yet (e.g. after email confirmation). Show auth.
    show('screen-auth');
    return;
  }
  profile=data;
  renderScreen();
}

function renderScreen(){
  hideAll('screen-auth','screen-admin','screen-student','screen-take-exam','screen-result');
  if(profile.role==='admin'){
    el('admin-name-display').textContent=profile.name;
    show('screen-admin'); adminTab('dashboard');
  } else {
    el('student-name-display').textContent=profile.name;
    show('screen-student'); studentTab('exams');
  }
}

// ─── AUTH ─────────────────────────────────────────────────
function switchAuthTab(t){
  el('auth-login').classList.toggle('hidden', t!=='login');
  el('auth-register').classList.toggle('hidden', t!=='register');
  el('auth-tabs').querySelectorAll('.tab').forEach((b,i)=>
    b.classList.toggle('active',(t==='login'&&i===0)||(t==='register'&&i===1)));
}
function toggleAdminCode(){
  el('admin-code-row').classList.toggle('hidden', el('reg-role').value!=='admin');
}

async function doLogin(){
  const email=el('login-email').value.trim().toLowerCase();
  const pass=el('login-pass').value;
  hide('login-error');
  if(!email||!pass){el('login-error').textContent='Enter your email and password.';show('login-error');return;}
  setBtn('login-btn',true,'');
  const{error}=await sb.auth.signInWithPassword({email,password:pass});
  setBtn('login-btn',false,'<i class="ti ti-login"></i> Sign in');
  if(error){
    const msg = error.message.includes('Invalid login')
      ? 'Incorrect email or password. Please try again.'

async function doRegister(){
  const name  = el('reg-name').value.trim();
  const email = el('reg-email').value.trim().toLowerCase();
  const pass  = el('reg-pass').value;
  const role  = el('reg-role').value;
  const code  = el('reg-admin-code').value.trim();
  hide('reg-error'); hide('reg-success');

  // Client-side validation
  if(!name||!email||!pass){ showRegErr('Please fill in all fields.'); return; }
  if(pass.length<6){ showRegErr('Password must be at least 6 characters.'); return; }
  if(role==='admin' && code!==ADMIN_CODE){ showRegErr('Incorrect admin code. Contact your system administrator.'); return; }

  setBtn('reg-btn',true,'');

  // Step 1: create auth user
  const{data,error}=await sb.auth.signUp({email,password:pass});

  if(error){
    // Common errors with friendly messages
    let msg=error.message;
    if(msg.includes('already registered') || msg.includes('already been registered')){
      msg='This email is already registered. Please sign in instead.';
    } else if(msg.includes('valid email')){
      msg='Please enter a valid email address.';
    } else if(msg.includes('Password')){
      msg='Password is too weak. Use at least 6 characters.';
    }
    showRegErr(msg);
    setBtn('reg-btn',false,'<i class="ti ti-user-plus"></i> Create account');
    return;
  }

  if(!data.user){
    showRegErr('Registration failed. Please try again.');
    setBtn('reg-btn',false,'<i class="ti ti-user-plus"></i> Create account');
    return;
  }

  // Step 2: insert profile row
  const{error:pe}=await sb.from('profiles').insert({id:data.user.id, name, role});

  if(pe){
    // If profile insert fails with duplicate, user already exists
    if(pe.code==='23505'){
      showRegErr('This email is already registered. Please sign in.');
    } else {
      showRegErr('Account created but profile setup failed: '+pe.message+'. Please contact support.');
    }
    setBtn('reg-btn',false,'<i class="ti ti-user-plus"></i> Create account');
    return;
  }

  setBtn('reg-btn',false,'<i class="ti ti-user-plus"></i> Create account');

  // Step 3: if Supabase auto-confirmed (no email confirmation required), session is active
  if(data.session){
    session=data.session;
    profile={id:data.user.id,name,role};
    renderScreen();
  } else {
    // Email confirmation is required
    el('reg-success').textContent='Account created! Check your email inbox and click the confirmation link, then come back and sign in.';
    show('reg-success');
    el('reg-name').value='';el('reg-email').value='';el('reg-pass').value='';
    el('reg-admin-code').value='';
  }
}

async function viewSubmission(sid){
  const{data:s}=await sb.from('submissions').select('*,profiles(name),exams(*)').eq('id',sid).single();
  const exam=s.exams; const pm=exam?exam.passmark||50:50; const pass=s.auto_score!=null&&s.auto_score>=pm;
  let html=`<div class="card mb-16">
    <div style="font-size:15px;font-weight:600">${s.profiles?s.profiles.name:'Unknown'}</div>
    <div class="text-xs mt-4">${exam?exam.title:'Deleted'} &middot; ${new Date(s.submitted_at).toLocaleString()}</div>
    ${s.auto_score!=null?`<div class="mt-8"><span class="badge ${pass?'badge-green':'badge-red'}">${s.auto_score}% — ${pass?'Passed':'Failed'}</span></div>`:''}
  </div>`;
  if(exam&&exam.questions){
    exam.questions.forEach((q,i)=>{
      const ans=s.answers[q.id];
      html+=`<div class="question-block mb-12"><div class="q-num">Q${i+1} <span class="badge badge-gray">${qTypeLabel(q.type)}</span></div><div class="q-text">${q.text}</div>`;
      if(q.type==='mcq'){
        q.options.forEach((o,oi)=>{
          const isAns=String(ans)===String(oi),isCorrect=String(q.correct)===String(oi);
          const cls=isCorrect?'correct':(isAns?'wrong':'');
          html+=`<div class="option-row ${cls}">${isCorrect?'<i class="ti ti-check"></i>':isAns?'<i class="ti ti-x"></i>':'<span style="width:16px;display:inline-block"></span>'} ${o}</div>`;
        });
      }else if(q.type==='truefalse'){
        ['True','False'].forEach((o,oi)=>{
          const isAns=String(ans)===String(oi),isCorrect=String(q.correct)===String(oi);
          const cls=isCorrect?'correct':(isAns?'wrong':'');
          html+=`<div class="option-row ${cls}">${isCorrect?'<i class="ti ti-check"></i>':isAns?'<i class="ti ti-x"></i>':'<span style="width:16px;display:inline-block"></span>'} ${o}</div>`;
        });
      }else{
        html+=`<div style="background:var(--surface2);padding:10px 14px;border-radius:var(--radius);font-size:14px;margin-top:4px;min-height:40px">${ans||'<em style="color:var(--text3)">No answer</em>'}</div>`;
        if(q.type==='short'&&q.modelAnswer)html+=`<div class="text-xs mt-8"><strong>Model answer:</strong> ${q.modelAnswer}</div>`;
      }
      html+='</div>';
    });
  }
  el('submission-review-content').innerHTML=html;
  show('modal-view-submission');
}

function renderQEditor(){
  el('q-count-badge').textContent=draftQuestions.length;
  el('questions-editor').innerHTML=draftQuestions.map((q,i)=>{
    let inner='';
    if(q.type==='mcq'){
      inner=q.options.map((o,oi)=>`
        <div class="flex align-center gap-8 mb-8">
          <input type="radio" name="c_${q.id}" ${q.correct==oi?'checked':''} onchange="setCorrect('${q.id}',${oi})" style="width:auto;flex-shrink:0">
          <input type="text" value="${o.replace(/"/g,'&quot;')}" placeholder="Option ${String.fromCharCode(65+oi)}" oninput="setOption('${q.id}',${oi},this.value)" style="flex:1">
          ${q.options.length>2?`<button class="btn btn-sm btn-danger" onclick="removeOption('${q.id}',${oi})" style="padding:4px 8px;flex-shrink:0"><i class="ti ti-x"></i></button>`:''}
        </div>`).join('')+
        (q.options.length<8?`<button class="btn btn-sm mt-4" onclick="addOption('${q.id}')"><i class="ti ti-plus"></i> Add option</button>`:'');
    }else if(q.type==='truefalse'){
      inner=`<div class="flex gap-24">
        <label class="flex align-center gap-8" style="cursor:pointer"><input type="radio" name="tf_${q.id}" ${q.correct==0?'checked':''} onchange="setCorrect('${q.id}',0)" style="width:auto"> True</label>
        <label class="flex align-center gap-8" style="cursor:pointer"><input type="radio" name="tf_${q.id}" ${q.correct==1?'checked':''} onchange="setCorrect('${q.id}',1)" style="width:auto"> False</label>
      </div><div class="text-xs mt-8">Select the correct answer above</div>`;
    }else if(q.type==='short'){
      inner=`<div class="mt-8"><div class="label">Model answer</div><input type="text" value="${(q.modelAnswer||'').replace(/"/g,'&quot;')}" placeholder="Expected answer..." oninput="setModelAnswer('${q.id}',this.value)"></div>`;
    }else{
      inner=`<div class="info-box mt-8" style="font-size:12px">Essay — student writes a long response. Reviewed manually by admin.</div>`;
    }
    return `<div class="question-block mb-12" style="border-color:var(--border2)">
      <div class="flex justify-between align-center mb-10">
        <div class="flex gap-8 align-center"><span class="badge badge-blue">Q${i+1}</span><span class="badge badge-gray" style="font-size:10px">${qTypeLabel(q.type)}</span></div>
        <button class="btn btn-sm btn-danger" onclick="removeQuestion('${q.id}')"><i class="ti ti-trash"></i></button>
      </div>
      <textarea rows="2" placeholder="Enter your question text here..." oninput="setQText('${q.id}',this.value)" style="width:100%;margin-bottom:10px;resize:vertical">${q.text}</textarea>
      ${inner}
    </div>`;
  }).join('');
}

function setQText(id,v){draftQuestions.find(q=>q.id===id).text=v;}
function setCorrect(id,v){draftQuestions.find(q=>q.id===id).correct=parseInt(v);}
function setOption(id,i,v){draftQuestions.find(q=>q.id===id).options[i]=v;}
function setModelAnswer(id,v){draftQuestions.find(q=>q.id===id).modelAnswer=v;}
function addOption(id){const q=draftQuestions.find(q=>q.id===id);if(q.options.length<8)q.options.push('');renderQEditor();}
function removeOption(id,oi){const q=draftQuestions.find(q=>q.id===id);q.options.splice(oi,1);if(q.correct>=q.options.length)q.correct=0;renderQEditor();}
function removeQuestion(id){draftQuestions=draftQuestions.filter(q=>q.id!==id);renderQEditor();}

async function saveExam(){
  const title    = el('exam-title-input').value.trim();
  const duration = parseInt(el('exam-duration-input').value)||60;
  const passmark = parseInt(el('exam-pass-input').value)||50;
  const status   = el('exam-status-input').value;
  const description = el('exam-desc-input').value.trim();
  hide('modal-exam-error');
  if(!title){el('modal-exam-error').textContent='Exam title is required.';show('modal-exam-error');return;}
  if(!draftQuestions.length){el('modal-exam-error').textContent='Add at least one question.';show('modal-exam-error');return;}
  for(const q of draftQuestions){
    if(!q.text.trim()){el('modal-exam-error').textContent='All questions must have text.';show('modal-exam-error');return;}
    if(q.type==='mcq'&&q.options.filter(o=>o.trim()).length<2){el('modal-exam-error').textContent='MCQ questions need at least 2 options.';show('modal-exam-error');return;}
  }
  setBtn('save-exam-btn',true,'');
  const payload={title,description,duration,passmark,status,questions:draftQuestions};
  let error;
  if(editingExamId){
    ({error}=await sb.from('exams').update(payload).eq('id',editingExamId));
  }else{
    payload.created_by=session.user.id;
    ({error}=await sb.from('exams').insert(payload));
  }
  setBtn('save-exam-btn',false,'<i class="ti ti-device-floppy"></i> Save exam');
  if(error){el('modal-exam-error').textContent='Save failed: '+error.message;show('modal-exam-error');return;}
  closeModal('modal-create-exam');
  renderAdminExams();
}

async function startExam(examId){
  const{data:exam}=await sb.from('exams').select('*').eq('id',examId).single();
  if(!exam)return;
  if(!confirm(`Start "${exam.title}"?\n\nDuration: ${exam.duration} minutes\nQuestions: ${(exam.questions||[]).length}\n\nThe timer starts immediately.`))return;
  currentExam=exam; examAnswers={};
  hideAll('screen-student'); show('screen-take-exam');
  el('exam-header').innerHTML=`
    <h1 style="font-size:22px;font-weight:700;margin-bottom:6px">${exam.title}</h1>
    ${exam.description?`<p class="text-sm">${exam.description}</p>`:''}
    <div class="flex gap-12 mt-8">
      <span class="badge badge-gray"><i class="ti ti-help-circle"></i> ${(exam.questions||[]).length} questions</span>
      <span class="badge badge-amber"><i class="ti ti-clock"></i> ${exam.duration} min</span>
      <span class="badge badge-blue"><i class="ti ti-percentage"></i> Pass: ${exam.passmark||50}%</span>
    </div>`;
  renderExamQuestions();
  startTimer(exam.duration*60);
}

function renderExamQuestions(){
  el('q-progress-text').textContent=`${currentExam.questions.length} questions total`;
  updateProgress();
  el('exam-questions').innerHTML=currentExam.questions.map((q,i)=>{
    let opts='';
    if(q.type==='mcq'){
      opts=q.options.map((o,oi)=>`<div class="option-row" id="opt_${q.id}_${oi}" onclick="selectOpt('${q.id}',${oi})">${o}</div>`).join('');
    }else if(q.type==='truefalse'){
      opts=`<div class="option-row" id="opt_${q.id}_0" onclick="selectOpt('${q.id}',0)">True</div>
            <div class="option-row" id="opt_${q.id}_1" onclick="selectOpt('${q.id}',1)">False</div>`;
    }else if(q.type==='short'){
      opts=`<input type="text" placeholder="Type your answer..." oninput="examAnswers['${q.id}']=this.value;updateProgress()" style="margin-top:4px">`;
    }else{
      opts=`<textarea rows="6" placeholder="Write your answer here..." oninput="examAnswers['${q.id}']=this.value;updateProgress()" style="width:100%;margin-top:8px;resize:vertical"></textarea>`;
    }
    return `<div class="question-block">
      <div class="q-num">Question ${i+1} of ${currentExam.questions.length} <span class="badge badge-gray" style="font-size:10px">${qTypeLabel(q.type)}</span></div>
      <div class="q-text">${q.text}</div>
      ${opts}
    </div>`;
  }).join('');
}

function selectOpt(qId,oi){
  examAnswers[qId]=oi;
  document.querySelectorAll(`[id^="opt_${qId}_"]`).forEach(o=>o.classList.remove('selected'));
  const s=document.getElementById(`opt_${qId}_${oi}`);if(s)s.classList.add('selected');
  updateProgress();
}
function updateProgress(){
  if(!currentExam)return;
  const answered=currentExam.questions.filter(q=>examAnswers[q.id]!=null&&examAnswers[q.id]!=='').length;
  const total=currentExam.questions.length;
  el('q-answered-text').textContent=`${answered} / ${total} answered`;
  el('q-progress-fill').style.width=Math.round((answered/total)*100)+'%';
}

function startTimer(seconds){
  clearInterval(timerInterval); let remaining=seconds;
  function tick(){
    const m=Math.floor(remaining/60).toString().padStart(2,'0');
    const s=(remaining%60).toString().padStart(2,'0');
    const d=el('exam-timer-display');
    d.textContent=m+':'+s;
    d.className='timer-display'+(remaining<=300?' warn':'')+(remaining<=60?' danger':'');
    if(remaining<=0){clearInterval(timerInterval);alert('Time is up! Your exam will be submitted now.');submitExam();}
    remaining--;
  }
  tick(); timerInterval=setInterval(tick,1000);
}

function confirmSubmit(){
  const answered=currentExam.questions.filter(q=>examAnswers[q.id]!=null&&examAnswers[q.id]!=='').length;
  const unanswered=currentExam.questions.length-answered;
  const msg=unanswered>0?`You have ${unanswered} unanswered question${unanswered>1?'s':''}.\n\nSubmit anyway?`:'Submit your exam now? This cannot be undone.';
  if(confirm(msg))submitExam();
}

async function submitExam(){
  clearInterval(timerInterval);
  const exam=currentExam;
  const gradeable=exam.questions.filter(q=>q.type==='mcq'||q.type==='truefalse');
  let auto_score=null;
  if(gradeable.length>0){
    const correct=gradeable.filter(q=>String(examAnswers[q.id])===String(q.correct)).length;
    auto_score=Math.round((correct/exam.questions.length)*100);
  }
  const{data:sub,error}=await sb.from('submissions')
    .insert({exam_id:exam.id,student_id:session.user.id,answers:examAnswers,auto_score})
    .select().single();
  if(error){alert('Error saving your submission: '+error.message);return;}
  showResult(sub,exam);
}

function showResult(sub,exam){
  hideAll('screen-take-exam','screen-student','screen-admin');
  show('screen-result');
  const pm=exam?exam.passmark||50:50;
  const pass=sub.auto_score!=null&&sub.auto_score>=pm;
  const sc=sub.auto_score!=null?(pass?'#8fcc40':'#f07170'):'#7ab5ef';
  const manual=exam?exam.questions.filter(q=>q.type==='short'||q.type==='essay').length:0;
  let html=`<div class="card mb-24" style="text-align:center">
    <div class="score-circle" style="border-color:${sc}">
      ${sub.auto_score!=null
        ?`<div style="font-size:30px;font-weight:700;color:${sc}">${sub.auto_score}%</div>
           <div style="font-size:11px;font-weight:600;color:${sc};letter-spacing:1px">${pass?'PASSED':'FAILED'}</div>`
        :`<i class="ti ti-clock" style="font-size:34px;color:#7ab5ef"></i>`}
    </div>
    <h2 style="font-size:20px;font-weight:700;margin-bottom:8px">${sub.auto_score!=null?(pass?'Great job!':'Keep studying'):'Submitted!'}</h2>
    <p class="text-sm">${sub.auto_score!=null?`You scored ${sub.auto_score}% — pass mark is ${pm}%`:'Your answers have been submitted.'}</p>
    ${manual>0?`<p class="text-xs mt-8" style="color:var(--text3)">${manual} essay/short answer question${manual>1?'s':''} will be reviewed by your instructor.</p>`:''}
  </div>
  <h3 style="font-size:15px;font-weight:600;margin-bottom:14px">Answer review</h3>`;
  if(exam&&exam.questions){
    exam.questions.forEach((q,i)=>{
      const ans=sub.answers[q.id]; let feedback='';
      if(q.type==='mcq'||q.type==='truefalse'){
        const opts=q.type==='mcq'?q.options:['True','False'];
        const correct=String(ans)===String(q.correct);
        feedback=`<div class="option-row ${correct?'correct':'wrong'} mt-8"><i class="ti ti-${correct?'check':'x'}"></i> ${ans!=null?opts[ans]:'No answer'}</div>`;
        if(!correct)feedback+=`<div class="text-xs mt-8"><i class="ti ti-check" style="color:#8fcc40"></i> Correct answer: ${opts[q.correct]}</div>`;
      }else{
        feedback=`<div style="background:var(--surface2);padding:10px 14px;border-radius:var(--radius);font-size:14px;margin-top:8px;min-height:40px">${ans||'<em style="color:var(--text3)">No answer provided</em>'}</div>`;
        if(q.type==='short'&&q.modelAnswer)feedback+=`<div class="text-xs mt-8"><strong>Model answer:</strong> ${q.modelAnswer}</div>`;
        if(q.type==='essay')feedback+=`<div class="text-xs mt-4" style="color:var(--text3)">Your instructor will review this response.</div>`;
      }
      html+=`<div class="question-block mb-12"><div class="q-num">Q${i+1} <span class="badge badge-gray">${qTypeLabel(q.type)}</span></div><div class="q-text">${q.text}</div>${feedback}</div>`;
    });
  }
  el('result-content').innerHTML=html;
}

async function viewMyResult(sid){
  const{data:s}=await sb.from('submissions').select('*,exams(*)').eq('id',sid).single();
  if(!s||!s.exams){alert('Exam data is no longer available.');return;}
  showResult(s,s.exams);
}
function goBackToDashboard(){
  hide('screen-result');
  if(profile.role==='admin'){show('screen-admin');adminTab('results');}
  else{show('screen-student');studentTab('myresults');}
}
</script>
</body>
</html>
